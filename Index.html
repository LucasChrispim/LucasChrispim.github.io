<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Departure Board Surprise</title>
<style>
:root{
--bg:#181818;
--panel:#202020;
--text:#f4f4f4;
--yellow:#f4dd17;
--tile:#2a2a2a;
--tile-border:#111;
}
*{box-sizing:border-box}
body{
margin:0;
min-height:100vh;
background:#111;
color:var(--text);
font-family:Arial,Helvetica,sans-serif;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}
.board{
width:min(100%,950px);
background:#1d1d1d;
border-radius:16px;
overflow:hidden;
border:1px solid #2d2d2d;
box-shadow:0 20px 50px rgba(0,0,0,.4);
}
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 24px;
background:#22221f;
}
.title{
font-size:48px;
font-weight:700;
}
.terminal{
font-size:40px;
font-weight:700;
color:var(--yellow);
}
.table{
padding:20px;
}
.row{
display:grid;
grid-template-columns:120px 1fr 140px 220px;
gap:10px;
align-items:center;
margin-bottom:10px;
}
.header{
color:#ccc;
font-size:14px;
margin-bottom:8px;
}
.cell{
display:flex;
flex-wrap:wrap;
}
.char{
width:22px;
height:34px;
background:linear-gradient(180deg,#3a3a3a 0%,#262626 48%,#1b1b1b 49%,#262626 100%);
border:1px solid var(--tile-border);
display:grid;
place-items:center;
font-weight:700;
font-size:22px;
margin-right:2px;
}
.char.space{
background:transparent;
border:none;
}
.meta{
padding:18px 20px;
line-height:1.7;
border-top:1px solid #333;
}
</style>
</head>
<body>
<div class="board">
<div class="top">
<div class="title">Departures</div>
<div class="terminal">Terminal A</div>
</div>

<div class="table">
<div class="row header">
<div>Time</div>
<div>To</div>
<div>Flight</div>
<div>Remarks</div>
</div>

<div class="row">
<div id="time" class="cell"></div>
<div id="destination" class="cell"></div>
<div id="flight" class="cell"></div>
<div id="status" class="cell"></div>
</div>

<div class="row">
<div></div>
<div id="msg1" class="cell"></div>
<div></div>
<div></div>
</div>

<div class="row">
<div></div>
<div id="msg2" class="cell"></div>
<div></div>
<div></div>
</div>

<div class="row">
<div></div>
<div id="msg3" class="cell"></div>
<div></div>
<div></div>
</div>

</div>

<div class="meta">
<strong>Passenger:</strong> Lara<br>
<strong>Flight:</strong> BentoAirlines‑2026<br>
<strong>Seat:</strong> 14A<br>
<strong>Gate:</strong> QR<br>
<strong>Destination:</strong> Scan to discover
</div>
</div>

<script>
const DESTINATIONS=[
{city:"PARIS",country:"FRANCE"},
{city:"TOKYO",country:"JAPAN"},
{city:"ROME",country:"ITALY"},
{city:"LISBON",country:"PORTUGAL"},
{city:"MADRID",country:"SPAIN"},
{city:"OSLO",country:"NORWAY"},
{city:"ATHENS",country:"GREECE"},
{city:"VIENNA",country:"AUSTRIA"},
{city:"DUBLIN",country:"IRELAND"},
{city:"ZURICH",country:"SWITZERLAND"},
{city:"PRAGUE",country:"CZECHIA"},
{city:"AMSTERDAM",country:"NETHERLANDS"}
];

const CHARSET="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

function pad(text,len){
return text.padEnd(len," ").slice(0,len);
}

function draw(id,text,len){
const el=document.getElementById(id);
el.innerHTML="";
pad(text,len).split("").forEach(c=>{
const d=document.createElement("div");
d.className="char"+(c===" "?" space":"");
d.textContent=c;
el.appendChild(d);
});
}

function randomChar(){
return CHARSET[Math.floor(Math.random()*CHARSET.length)];
}

function animate(id,finalText,len,steps=20,speed=60,callback){
let step=0;
const target=pad(finalText,len).split("");
const timer=setInterval(()=>{
const txt=target.map((c,i)=>{
if(c===' ')return ' ';
if(step>steps*(i/target.length))return c;
return randomChar();
}).join('');

draw(id,txt,len);
step++;
if(step>steps+target.length){
clearInterval(timer);
draw(id,finalText,len);
if(callback)callback();
}
},speed);
}

const chosen=DESTINATIONS[Math.floor(Math.random()*DESTINATIONS.length)];

const destinationText=`${chosen.city} ${chosen.country}`;

// initial

draw("time","11:30",5);
draw("destination","SCANNING",18);
draw("flight","BA2026",8);
draw("status","PREPARING",18);

setTimeout(()=>{
animate("destination",destinationText,18,22,65,()=>{
animate("status","BOARDING",18,12,60);
});
},800);

setTimeout(()=>animate("msg1","FELIZ ANIVERSARIO",18,12,60),3000);
setTimeout(()=>animate("msg2","NAO IMPORTA O LUGAR",22,12,60),4200);
setTimeout(()=>animate("msg3","SEMPRE QUE PRECISAR VOU ESTAR ONDE FOR",36,20,45),5400);
</script>
</body>
</html>
